<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Iniciar sesión – Happy Flower" />
    <title>Ingresar – Happy Flower</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/public/css/login.css" />
    <link rel="icon" type="image/png" href="/public/images/logo.jpeg">
</head>

<body>

    <a href="#main-content" class="skip-link">Ir al contenido principal</a>

    <!-- NAVBAR -->
    <header>
        <nav class="navbar navbar-login" aria-label="Navegación">
            <div class="container">
                <a href="/" class="navbar-brand-logo">Happy <span>Flower</span></a>
                <a href="/catalogo" class="btn-guest">
                    <i class="bi bi-grid-3x3-gap me-1"></i>Ver catálogo sin cuenta
                </a>
            </div>
        </nav>
    </header>

    <main id="main-content" class="login-main">
        <div class="login-wrapper">

            <!-- TARJETA PRINCIPAL -->
            <div class="login-card" role="region" aria-label="Acceso al sistema">

                <!-- ENCABEZADO -->
                <div class="login-card-header">
                    <div class="login-logo" aria-hidden="true">🌸</div>
                    <h1 class="login-title">Happy <span>Flower</span></h1>
                    <p class="login-subtitle">Bienvenido, ¿cómo deseas ingresar?</p>
                </div>

                <!-- SELECTOR DE ROL -->
                

                <!--INICIAR SESIÓN -->
                <div id="panelLogin" class="auth-panel">
                    <h2 class="panel-title">Iniciar sesión</h2>

                    <div id="loginAlert" class="auth-alert d-none" role="alert" aria-live="polite"></div>

                    <div class="mb-3">
                        <label for="loginCorreo" class="form-label">Correo electrónico</label>
                        <div class="input-icon-wrap">
                            <i class="bi bi-envelope input-icon"></i>
                            <input type="email" id="loginCorreo" class="form-control ps-icon"
                                placeholder="correo@ejemplo.com" autocomplete="email" required />
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="loginContrasena" class="form-label">Contraseña</label>
                        <div class="input-icon-wrap">
                            <i class="bi bi-lock input-icon"></i>
                            <input type="password" id="loginContrasena" class="form-control ps-icon"
                                placeholder="••••••••" autocomplete="current-password" required />
                            <button class="btn-toggle-pass" id="btnVerPass" aria-label="Mostrar contraseña" type="button">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>

                    <button class="btn-auth-primary" id="btnLogin" type="button">
                        <span class="btn-text"><i class="bi bi-box-arrow-in-right me-2"></i>Ingresar</span>
                        <span class="btn-spinner spinner-border spinner-border-sm d-none" role="status"></span>
                    </button>

                    <p class="switch-link mt-3">
                        ¿No tienes cuenta?
                        <button class="link-btn" id="btnIrRegistro" type="button">Regístrate gratis</button>
                    </p>
                </div>

                <!--  REGISTRO -->
                <div id="panelRegistro" class="auth-panel d-none">
                    <h2 class="panel-title">Crear cuenta</h2>

                    <div id="registroAlert" class="auth-alert d-none" role="alert" aria-live="polite"></div>

                    <div class="row g-3 mb-3">
                        <div class="col-6">
                            <label for="regNombre" class="form-label">Nombre</label>
                            <input type="text" id="regNombre" class="form-control" placeholder="Ana" required />
                        </div>
                        <div class="col-6">
                            <label for="regApellido" class="form-label">Apellido</label>
                            <input type="text" id="regApellido" class="form-control" placeholder="García" />
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="regCorreo" class="form-label">Correo electrónico</label>
                        <div class="input-icon-wrap">
                            <i class="bi bi-envelope input-icon"></i>
                            <input type="email" id="regCorreo" class="form-control ps-icon"
                                placeholder="correo@ejemplo.com" autocomplete="email" required />
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="regTelefono" class="form-label">Teléfono <small class="text-muted">(opcional)</small></label>
                        <div class="input-icon-wrap">
                            <i class="bi bi-phone input-icon"></i>
                            <input
                                    type="tel"
                                    id="regTelefono"
                                    class="form-control ps-icon"
                                    placeholder="9XXXXXXXX"
                                    maxlength="9"
                                    pattern="9[0-9]{8}"
                                    inputmode="numeric"
                                />
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="regContrasena" class="form-label">Contraseña</label>
                        <div class="input-icon-wrap">
                            <i class="bi bi-lock input-icon"></i>
                            <input type="password" id="regContrasena" class="form-control ps-icon"
                                placeholder="Mínimo 6 caracteres" autocomplete="new-password" required />
                        </div>
                    </div>

                    <button class="btn-auth-primary" id="btnRegistro" type="button">
                        <span class="btn-text"><i class="bi bi-person-plus me-2"></i>Crear cuenta</span>
                        <span class="btn-spinner spinner-border spinner-border-sm d-none" role="status"></span>
                    </button>

                    <p class="switch-link mt-3">
                        ¿Ya tienes cuenta?
                        <button class="link-btn" id="btnIrLogin" type="button">Inicia sesión</button>
                    </p>
                </div>

                <div class="auth-divider"><span>o continúa</span></div>

                <!-- ACCESO SIN CUENTA -->
                <a href="/" class="btn-guest-access">
                    <i class="bi bi-house me-2"></i>Ingresar sin cuenta
                </a>

            </div><!-- /login-card -->
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/public/js/login_src.js"></script>
</body>

</html>
